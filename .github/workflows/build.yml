name: 🔥 Build Phoenix Fire APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Get version timestamp
        id: version
        run: echo "VERSION=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Rename signed APK
        run: |
          cp "${{ steps.sign_app.outputs.signedReleaseFile }}" \
             "app/build/outputs/apk/release/PhoenixFire-v${{ steps.version.outputs.VERSION }}.apk"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoenixFire-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoenixFire-v${{ steps.version.outputs.VERSION }}
          path: app/build/outputs/apk/release/PhoenixFire-v${{ steps.version.outputs.VERSION }}.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "🔥 Phoenix Fire v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🔥 Phoenix Fire — Ready to Install

            **Download the APK below and transfer it to your Android phone.**

            ### How to install
            1. Download `PhoenixFire-v*.apk`
            2. Transfer to your Android phone
            3. Open the file on your phone → tap Install
            4. Open Phoenix Fire → tap Find My Firestick → pick an app → Send!

            Built from: ${{ github.sha }}
          files: app/build/outputs/apk/release/PhoenixFire-v${{ steps.version.outputs.VERSION }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
