name: 🔥 Build Phoenix Fire APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          sudo apt-get install -y wget unzip
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q cmdtools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools:$HOME/android-sdk/build-tools/34.0.0" >> $GITHUB_ENV

      - name: Accept Android SDK licenses & install build tools
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip
          unzip -q gradle.zip -d $HOME
          echo "$HOME/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          gradle assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Build Release APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          gradle assembleRelease --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Get version timestamp
        id: version
        run: echo "VERSION=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Rename signed APK
        run: |
          cp "${{ steps.sign_app.outputs.signedReleaseFile }}" \
             "app/build/outputs/apk/release/PhoenixFire-v${{ steps.version.outputs.VERSION }}.apk"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoenixFire-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoenixFire-v${{ steps.version.outputs.VERSION }}
          path: app/build/outputs/apk/release/PhoenixFire-v${{ steps.version.outputs.VERSION }}.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "🔥 Phoenix Fire v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🔥 Phoenix Fire — Ready to Install

            Download the APK below and transfer to your Android phone.

            1. Download PhoenixFire-v*.apk
            2. Transfer to your Android phone
            3. Open the file → tap Install
            4. Open Phoenix Fire → Find Firestick → Pick app → Send!

            Built from: ${{ github.sha }}
          files: app/build/outputs/apk/release/PhoenixFire-v${{ steps.version.outputs.VERSION }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
