name: Build Phoenix Fire APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip
          unzip -q gradle.zip -d $HOME
          echo "$HOME/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Build Release APK
        run: gradle assembleRelease --stacktrace --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Get version timestamp
        id: version
        run: echo "VERSION=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Rename signed APK
        run: |
          cp "${{ steps.sign_app.outputs.signedReleaseFile }}" "app/build/outputs/apk/release/PhoenixFire-v${{ steps.version.outputs.VERSION }}.apk"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoenixFire-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoenixFire-Release
          path: app/build/outputs/apk/release/PhoenixFire-v${{ steps.version.outputs.VERSION }}.apk
          retention-days: 90
