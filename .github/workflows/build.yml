- name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "🔥 Phoenix Fire v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🔥 Phoenix Fire — Ready to Install

            Download the APK below and transfer to your Android phone.

            1. Download PhoenixFire-v*.apk
            2. Transfer to your Android phone
            3. Open the file → tap Install
            4. Open Phoenix Fire → Find Firestick → Pick app → Send!

            Built from: ${{ github.sha }}
          files: app/build/outputs/apk/release/PhoenixFire-v${{ steps.version.outputs.VERSION }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
